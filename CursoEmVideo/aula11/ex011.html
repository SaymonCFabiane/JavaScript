<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
    <style>
        input#txtvel{
            width: 50px;
            border-radius: 5px;
        }
        p{
            font: normal 17px arial;
        }
    </style>
</head>
<body>

    <h1>Sistema de multas.</h1>
    Velocidade do carro:<input type="number
    " name="txtvel" id="txtvel"> Km
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res"><p>Resultado</p></div>
    <script>

        function calcular(){
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade é de <strong>${vel}km/h</strong></p>`
            if (vel > 80){
                res.innerHTML = `<p>Você esta <strong>MULTADO</strong> por excesso de velocidade!</p>`
            } else {
                res.innerHTML = `<p>Continue!</p>`
            }
            
           
            
        }

    </script>
    
</body>
</html>
